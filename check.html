<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>モーションデータ確認 — 二足歩行 & 魚泳ぎ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'Courier New', monospace; overflow: hidden; }

#ui {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; gap: 0;
  background: rgba(10,10,15,0.92); border-bottom: 1px solid #222;
  padding: 0;
}
.tab {
  padding: 12px 28px; font-size: 13px; letter-spacing: 0.08em;
  cursor: pointer; border: none; background: none; color: #666;
  border-bottom: 2px solid transparent; transition: all 0.2s;
}
.tab.active { color: #e0e0e0; border-bottom-color: #4a9eff; }
.tab:hover:not(.active) { color: #aaa; }

#info-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  background: rgba(10,10,15,0.92); border-top: 1px solid #1a1a2a;
  padding: 10px 20px;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
}
.info-item { font-size: 11px; }
.info-label { color: #555; margin-bottom: 2px; }
.info-value { color: #7eb8ff; font-size: 13px; font-weight: bold; }

#canvas-container { position: fixed; top: 44px; left: 0; right: 0; bottom: 64px; }
canvas { display: block; }
</style>
</head>
<body>
<div id="ui">
  <button class="tab active" onclick="switchMode('biped')">二足歩行</button>
  <button class="tab" onclick="switchMode('fish')">魚 (泳ぎ)</button>
</div>

<div id="canvas-container">
  <canvas id="c"></canvas>
</div>

<div id="info-panel">
  <div class="info-item"><div class="info-label">phase</div><div class="info-value" id="v-phase">0.00</div></div>
  <div class="info-item"><div class="info-label">joint_0</div><div class="info-value" id="v-j0">0.00</div></div>
  <div class="info-item"><div class="info-label">joint_1</div><div class="info-value" id="v-j1">0.00</div></div>
  <div class="info-item"><div class="info-label">joint_2</div><div class="info-value" id="v-j2">0.00</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled = true;

const W = canvas.parentElement.clientWidth;
const H = canvas.parentElement.clientHeight;
renderer.setSize(W, H);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 12, 28);

const camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 100);
camera.position.set(0, 1.8, 6);
camera.lookAt(0, 0.8, 0);

// Lights
scene.add(new THREE.AmbientLight(0x223344, 1.2));
const dLight = new THREE.DirectionalLight(0x8ab4ff, 1.4);
dLight.position.set(3, 6, 4);
dLight.castShadow = true;
scene.add(dLight);
const fill = new THREE.PointLight(0x4466aa, 0.6, 15);
fill.position.set(-3, 2, 2);
scene.add(fill);

// Floor
const floorGeo = new THREE.PlaneGeometry(20, 20, 20, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x111118, wireframe: false });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// Grid lines
const grid = new THREE.GridHelper(20, 20, 0x1a1a2e, 0x1a1a2e);
scene.add(grid);

// ---------- Materials ----------
const bodyMat  = new THREE.MeshStandardMaterial({ color: 0x3a7bd5, roughness: 0.6, metalness: 0.1 });
const limbMat  = new THREE.MeshStandardMaterial({ color: 0x2a5ca8, roughness: 0.5 });
const headMat  = new THREE.MeshStandardMaterial({ color: 0x4a8be5, roughness: 0.4 });
const fishMat  = new THREE.MeshStandardMaterial({ color: 0x1a9e8f, roughness: 0.3, metalness: 0.2 });
const finMat   = new THREE.MeshStandardMaterial({ color: 0x0d7a6e, roughness: 0.4, transparent: true, opacity: 0.85 });
const eyeMat   = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 });

// ============================================================
// BIPED CHARACTER
// ============================================================
function makeBiped() {
  const root = new THREE.Group();

  // Torso
  const torsoGeo = new THREE.BoxGeometry(0.32, 0.44, 0.18);
  const torso = new THREE.Mesh(torsoGeo, bodyMat);
  torso.position.y = 0.22;
  torso.castShadow = true;
  root.add(torso);

  // Head
  const headGeo = new THREE.BoxGeometry(0.22, 0.22, 0.22);
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 0.55;
  head.castShadow = true;
  root.add(head);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.03, 6, 6);
  [-0.06, 0.06].forEach(x => {
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(x, 0.56, 0.11);
    root.add(eye);
  });

  // Arms
  function makeArm(side) {
    const g = new THREE.Group();
    g.position.set(side * 0.22, 0.38, 0);
    const upper = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.22, 0.08), limbMat);
    upper.position.y = -0.11;
    upper.castShadow = true;
    g.add(upper);
    const lower = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.20, 0.07), limbMat);
    lower.position.y = -0.33;
    lower.castShadow = true;
    g.add(lower);
    root.add(g);
    return g;
  }
  const lArm = makeArm(-1);
  const rArm = makeArm( 1);

  // Legs (hip pivot at top)
  function makeLeg(side) {
    const hip = new THREE.Group();
    hip.position.set(side * 0.10, 0.0, 0);

    const thigh = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.26, 0.10), limbMat);
    thigh.position.y = -0.13;
    thigh.castShadow = true;

    const kneeGroup = new THREE.Group();
    kneeGroup.position.y = -0.26;
    const shin = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.24, 0.09), limbMat);
    shin.position.y = -0.12;
    shin.castShadow = true;

    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.05, 0.14), limbMat);
    foot.position.set(0, -0.25, 0.03);
    foot.castShadow = true;

    kneeGroup.add(shin);
    kneeGroup.add(foot);
    hip.add(thigh);
    hip.add(kneeGroup);
    root.add(hip);
    return { hip, kneeGroup };
  }

  const lLeg = makeLeg(-1);
  const rLeg = makeLeg( 1);

  root.position.y = 0.52;

  return { root, lArm, rArm, lLeg, rLeg, torso, head };
}

// ============================================================
// FISH CHARACTER — segmented spine
// ============================================================
function makeFish() {
  const root = new THREE.Group();

  // Spine segments (5 segments)
  const segments = [];
  const segCount = 6;
  const segLens = [0.30, 0.25, 0.22, 0.18, 0.14, 0.10];
  const segWidths = [0.22, 0.20, 0.17, 0.13, 0.09, 0.05];
  const segHeights = [0.18, 0.17, 0.14, 0.10, 0.07, 0.04];

  let cumX = 0;
  for (let i = 0; i < segCount; i++) {
    const g = new THREE.Group();
    g.position.x = cumX;
    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(segLens[i], segHeights[i], segWidths[i]),
      fishMat
    );
    mesh.castShadow = true;
    g.add(mesh);
    if (i > 0) segments[i-1].add(g);
    else root.add(g);
    segments.push(g);
    cumX = segLens[i] * 0.5 + segLens[Math.min(i+1, segCount-1)] * 0.5;
  }

  // Head (attached to first segment)
  const headGeo = new THREE.SphereGeometry(0.14, 8, 8);
  headGeo.scale(1.2, 0.8, 1.0);
  const headMesh = new THREE.Mesh(headGeo, fishMat);
  headMesh.position.x = -0.20;
  headMesh.castShadow = true;
  root.add(headMesh);

  // Eye
  const eyeGeo = new THREE.SphereGeometry(0.035, 6, 6);
  const eye = new THREE.Mesh(eyeGeo, eyeMat);
  eye.position.set(-0.25, 0.06, 0.11);
  root.add(eye);

  // Dorsal fin
  const dorsalGeo = new THREE.ConeGeometry(0.10, 0.22, 4);
  const dorsal = new THREE.Mesh(dorsalGeo, finMat);
  dorsal.position.set(0.05, 0.16, 0);
  dorsal.rotation.z = -0.2;
  root.add(dorsal);

  // Pectoral fins
  function makePectFin(side) {
    const g = new THREE.Group();
    g.position.set(0.05, 0, side * 0.12);
    const fin = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.03, 0.12), finMat);
    fin.rotation.z = side * 0.3;
    g.add(fin);
    root.add(g);
    return g;
  }
  const lFin = makePectFin(-1);
  const rFin = makePectFin( 1);

  // Tail fin (caudal) — attached to last segment
  const tailFin = new THREE.Group();
  const tailUpper = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.18, 0.04), finMat);
  tailUpper.position.y = 0.09;
  const tailLower = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.14, 0.04), finMat);
  tailLower.position.y = -0.07;
  tailFin.add(tailUpper);
  tailFin.add(tailLower);
  segments[segCount-1].add(tailFin);

  root.rotation.y = Math.PI; // face forward
  root.position.set(0, 0.6, 0);

  return { root, segments, lFin, rFin, tailFin };
}

// ============================================================
// Motion synthesis functions
// ============================================================

// Biped: standard gait kinematics
function animateBiped(biped, t) {
  const phase = t * 2.8;
  const walkAmp = 0.45;

  // Hip sway
  biped.torso.rotation.z = Math.sin(phase * 2) * 0.04;
  biped.head.rotation.y  = Math.sin(phase * 0.5) * 0.06;

  // Left leg: hip + knee
  biped.lLeg.hip.rotation.x    =  Math.sin(phase) * walkAmp;
  biped.lLeg.kneeGroup.rotation.x = Math.max(0, -Math.sin(phase)) * 0.55;

  // Right leg: opposite phase
  biped.rLeg.hip.rotation.x    = -Math.sin(phase) * walkAmp;
  biped.rLeg.kneeGroup.rotation.x = Math.max(0,  Math.sin(phase)) * 0.55;

  // Arms swing opposite to legs
  biped.lArm.rotation.x = -Math.sin(phase) * 0.30;
  biped.rArm.rotation.x =  Math.sin(phase) * 0.30;

  // Subtle vertical bob
  biped.root.position.y = 0.52 + Math.abs(Math.sin(phase)) * 0.03;

  return {
    phase: (phase % (Math.PI*2)).toFixed(2),
    lHip: (biped.lLeg.hip.rotation.x).toFixed(3),
    rHip: (biped.rLeg.hip.rotation.x).toFixed(3),
    lKnee: (biped.lLeg.kneeGroup.rotation.x).toFixed(3)
  };
}

// Fish: body caudal propulsion (BCP) model
// Traveling wave from head to tail, amplitude increasing toward tail
function animateFish(fish, t) {
  const freq   = 2.2;
  const phase  = t * freq;
  const ampBase = 0.08;   // head-end amplitude (small)
  const ampTail = 0.55;   // tail-end amplitude (large)
  const waveK  = 0.9;    // spatial frequency

  const segCount = fish.segments.length;

  // Each segment position along body (0=head, 1=tail)
  for (let i = 0; i < segCount; i++) {
    const s = i / (segCount - 1);               // 0→1
    const amp = ampBase + (ampTail - ampBase) * s * s;  // quadratic growth
    const offset = waveK * s * Math.PI;          // phase delay toward tail
    fish.segments[i].rotation.y = Math.sin(phase - offset) * amp;
  }

  // Pectoral fins: slight oscillation (steering)
  fish.lFin.rotation.x =  Math.sin(phase * 0.7) * 0.15;
  fish.rFin.rotation.x = -Math.sin(phase * 0.7) * 0.15;

  // Gentle pitch oscillation
  fish.root.rotation.x = Math.sin(phase * 0.4) * 0.04;

  // Slow forward drift
  fish.root.position.x = Math.sin(t * 0.3) * 0.8;
  fish.root.position.y = 0.6 + Math.sin(t * 0.5) * 0.15;

  return {
    phase: (phase % (Math.PI*2)).toFixed(2),
    seg0: (fish.segments[0].rotation.y).toFixed(3),
    seg2: (fish.segments[2].rotation.y).toFixed(3),
    seg4: (fish.segments[4].rotation.y).toFixed(3)
  };
}

// ============================================================
// Scene management
// ============================================================
let mode = 'biped';
let bipedObj = null;
let fishObj  = null;
let waterPlane = null;

function clearScene() {
  [bipedObj, fishObj, waterPlane].forEach(obj => {
    if (obj) scene.remove(obj.root || obj);
  });
  bipedObj = fishObj = null;
  if (waterPlane) { scene.remove(waterPlane); waterPlane = null; }
}

function setupBiped() {
  clearScene();
  bipedObj = makeBiped();
  scene.add(bipedObj.root);
  camera.position.set(0, 1.8, 5.5);
  camera.lookAt(0, 0.9, 0);
  floor.visible = true;
  grid.visible = true;
  scene.background = new THREE.Color(0x0a0a0f);
  scene.fog = new THREE.Fog(0x0a0a0f, 12, 28);
  updateLabels('lHip','rHip','lKnee');
}

function setupFish() {
  clearScene();
  fishObj = makeFish();
  scene.add(fishObj.root);

  // Water volume (semi-transparent plane)
  const wGeo = new THREE.PlaneGeometry(20, 20);
  const wMat = new THREE.MeshStandardMaterial({
    color: 0x0d3d5a, transparent: true, opacity: 0.35, side: THREE.DoubleSide
  });
  waterPlane = new THREE.Mesh(wGeo, wMat);
  waterPlane.rotation.x = -Math.PI/2;
  waterPlane.position.y = 1.5;
  scene.add(waterPlane);

  camera.position.set(0, 0.8, 5.0);
  camera.lookAt(0, 0.6, 0);
  floor.visible = false;
  grid.visible = false;
  scene.background = new THREE.Color(0x050e18);
  scene.fog = new THREE.Fog(0x050e18, 10, 24);
  updateLabels('seg[0]','seg[2]','seg[4]');
}

function updateLabels(l0, l1, l2) {
  document.querySelector('#info-panel .info-item:nth-child(2) .info-label').textContent = l0;
  document.querySelector('#info-panel .info-item:nth-child(3) .info-label').textContent = l1;
  document.querySelector('#info-panel .info-item:nth-child(4) .info-label').textContent = l2;
}

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  if (m === 'biped') setupBiped();
  else setupFish();
}

setupBiped();

// ============================================================
// Render loop
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  let vals;

  if (mode === 'biped' && bipedObj) {
    vals = animateBiped(bipedObj, t);
    document.getElementById('v-phase').textContent = vals.phase;
    document.getElementById('v-j0').textContent = vals.lHip;
    document.getElementById('v-j1').textContent = vals.rHip;
    document.getElementById('v-j2').textContent = vals.lKnee;
  } else if (mode === 'fish' && fishObj) {
    vals = animateFish(fishObj, t);
    document.getElementById('v-phase').textContent = vals.phase;
    document.getElementById('v-j0').textContent = vals.seg0;
    document.getElementById('v-j1').textContent = vals.seg2;
    document.getElementById('v-j2').textContent = vals.seg4;
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  const W2 = canvas.parentElement.clientWidth;
  const H2 = canvas.parentElement.clientHeight;
  renderer.setSize(W2, H2);
  camera.aspect = W2/H2;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
